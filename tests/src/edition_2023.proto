edition = "2023";

package edition_2023;

message Test {
  int32 current = 1;
  int32 outdated = 2 [deprecated = true];
  repeated int32 current_packed = 3;
  repeated int32 deprecated_packed = 4 [deprecated = true];
  repeated int32 current_feature_packed = 5 [features.repeated_field_encoding = PACKED];
  repeated int32 current_feature_expanded = 6 [features.repeated_field_encoding = EXPANDED];
  repeated int32 deprecated_feature_packed = 7 [deprecated = true, features.repeated_field_encoding = PACKED];
  repeated int32 deprecated_feature_expanded = 8 [deprecated = true, features.repeated_field_encoding = EXPANDED];
}
